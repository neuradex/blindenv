<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 760" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .title { font-size: 16px; font-weight: 600; fill: #1a1a1a; }
    .subtitle { font-size: 12px; font-weight: 400; fill: #656565; }
    .layer-title { font-size: 13px; font-weight: 600; fill: currentColor; }
    .layer-desc { font-size: 11px; font-weight: 400; fill: currentColor; }
    .box-title { font-size: 12px; font-weight: 600; fill: currentColor; }
    .box-desc { font-size: 10.5px; font-weight: 400; fill: currentColor; }
    .label { font-size: 10px; font-weight: 500; fill: #888; }
    .zone-label { font-size: 10px; font-weight: 600; fill: #999; letter-spacing: 0.5px; text-transform: uppercase; }
  </style>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1.5L7.5 5L2 8.5" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="760" rx="12" fill="#ffffff"/>

  <!-- Title -->
  <text class="title" x="360" y="36" text-anchor="middle">blindenv — defense architecture</text>
  <text class="subtitle" x="360" y="54" text-anchor="middle">Agents use your secrets but never see them</text>

  <!-- Agent context zone -->
  <rect x="40" y="76" width="640" height="108" rx="10" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="0.75" stroke-dasharray="5 3"/>
  <text class="zone-label" x="56" y="94">Agent context</text>

  <!-- Agent request -->
  <rect x="60" y="106" width="260" height="60" rx="8" fill="#EBF3FE" stroke="#B0CFF5" stroke-width="0.75"/>
  <text class="box-title" x="190" y="130" text-anchor="middle" fill="#1a5a9e">Agent request</text>
  <text class="box-desc" x="190" y="148" text-anchor="middle" fill="#3a7fd5">curl -H "Authorization: $API_KEY" ...</text>

  <!-- Agent receives -->
  <rect x="400" y="106" width="260" height="60" rx="8" fill="#f0f0ee" stroke="#d0d0cc" stroke-width="0.75"/>
  <text class="box-title" x="530" y="130" text-anchor="middle" fill="#444">Agent receives</text>
  <text class="box-desc" x="530" y="148" text-anchor="middle" fill="#777">{"result":"ok", "token":"[REDACTED]"}</text>

  <!-- Flow arrows -->
  <line x1="190" y1="184" x2="190" y2="222" stroke="#3a7fd5" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="530" y1="222" x2="530" y2="184" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>
  <text class="label" x="202" y="208" fill="#3a7fd5">request ↓</text>
  <text class="label" x="542" y="208">↑ response</text>

  <!-- blindenv proxy zone -->
  <rect x="40" y="222" width="640" height="420" rx="12" fill="#fafaf9" stroke="#ccc" stroke-width="1"/>
  <text class="zone-label" x="56" y="244">blindenv proxy</text>

  <!-- Layer 1: Config protection -->
  <rect x="60" y="258" width="600" height="54" rx="8" fill="#FCEBEB" stroke="#F09595" stroke-width="0.75"/>
  <text class="layer-title" x="80" y="280" fill="#7a2020">① Config protection</text>
  <text class="layer-desc" x="80" y="296" fill="#a33030">blindenv.yml is tamper-proof — agents cannot modify rules</text>

  <!-- Layer 2: File invisibility -->
  <rect x="60" y="322" width="600" height="54" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.75"/>
  <text class="layer-title" x="80" y="344" fill="#6e2c10">② File invisibility</text>
  <text class="layer-desc" x="80" y="360" fill="#993c1d">Secret files return "does not exist" — not blocked, invisible</text>

  <!-- Layer 3: Content-aware blocking -->
  <rect x="60" y="386" width="600" height="54" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.75"/>
  <text class="layer-title" x="80" y="408" fill="#6a3d05">③ Content-aware blocking</text>
  <text class="layer-desc" x="80" y="424" fill="#854f0b">Copied or renamed files containing secret values are also blocked</text>

  <!-- Layer 4: Subprocess isolation -->
  <rect x="60" y="450" width="600" height="54" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.75"/>
  <text class="layer-title" x="80" y="472" fill="#04342c">④ Subprocess isolation</text>
  <text class="layer-desc" x="80" y="488" fill="#0f6e56">Real values injected only in the isolated subprocess environment</text>

  <!-- Layer 5: Output redaction -->
  <rect x="60" y="514" width="600" height="54" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.75"/>
  <text class="layer-title" x="80" y="536" fill="#26215c">⑤ Output redaction</text>
  <text class="layer-desc" x="80" y="552" fill="#534ab7">All stdout/stderr scanned — secret values replaced with [REDACTED]</text>

  <!-- Flow connectors between layers (left = down, right = up) -->
  <line x1="190" y1="312" x2="190" y2="322" stroke="#ddd" stroke-width="0.75"/>
  <line x1="190" y1="376" x2="190" y2="386" stroke="#ddd" stroke-width="0.75"/>
  <line x1="190" y1="440" x2="190" y2="450" stroke="#ddd" stroke-width="0.75"/>
  <line x1="190" y1="504" x2="190" y2="514" stroke="#ddd" stroke-width="0.75"/>

  <line x1="530" y1="514" x2="530" y2="504" stroke="#ddd" stroke-width="0.75"/>
  <line x1="530" y1="450" x2="530" y2="440" stroke="#ddd" stroke-width="0.75"/>
  <line x1="530" y1="386" x2="530" y2="376" stroke="#ddd" stroke-width="0.75"/>
  <line x1="530" y1="322" x2="530" y2="312" stroke="#ddd" stroke-width="0.75"/>

  <!-- Bottom: .env and External API -->
  <rect x="60" y="590" width="260" height="44" rx="8" fill="#f0f0ee" stroke="#d0d0cc" stroke-width="0.75"/>
  <text class="box-title" x="190" y="617" text-anchor="middle" fill="#444">.env / credentials</text>

  <rect x="400" y="590" width="260" height="44" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.75"/>
  <text class="box-title" x="530" y="617" text-anchor="middle" fill="#0f6e56">External API</text>

  <!-- Arrows from .env up to layer 4 -->
  <line x1="190" y1="590" x2="190" y2="570" stroke="#0f6e56" stroke-width="1" marker-end="url(#arr)"/>
  <text class="label" x="202" y="584" fill="#0f6e56">secrets loaded</text>

  <!-- Arrow from layer 5 down to API -->
  <line x1="530" y1="570" x2="530" y2="590" stroke="#3b6d11" stroke-width="1" marker-end="url(#arr)"/>
  <text class="label" x="542" y="584" fill="#3b6d11">real request</text>

  <!-- Hook badges at bottom -->
  <text class="zone-label" x="360" y="670" text-anchor="middle">Claude Code hooks</text>

  <rect x="52" y="682" width="88" height="28" rx="14" fill="#EBF3FE" stroke="#B0CFF5" stroke-width="0.5"/>
  <text x="96" y="700" text-anchor="middle" font-size="10" font-weight="500" fill="#1a5a9e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">Bash</text>

  <rect x="152" y="682" width="88" height="28" rx="14" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text x="196" y="700" text-anchor="middle" font-size="10" font-weight="500" fill="#993c1d" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">Read</text>

  <rect x="252" y="682" width="88" height="28" rx="14" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="296" y="700" text-anchor="middle" font-size="10" font-weight="500" fill="#854f0b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">Grep</text>

  <rect x="352" y="682" width="88" height="28" rx="14" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="396" y="700" text-anchor="middle" font-size="10" font-weight="500" fill="#854f0b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">Glob</text>

  <rect x="452" y="682" width="88" height="28" rx="14" fill="#FCEBEB" stroke="#F09595" stroke-width="0.5"/>
  <text x="496" y="700" text-anchor="middle" font-size="10" font-weight="500" fill="#7a2020" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">Edit</text>

  <rect x="552" y="682" width="88" height="28" rx="14" fill="#FCEBEB" stroke="#F09595" stroke-width="0.5"/>
  <text x="596" y="700" text-anchor="middle" font-size="10" font-weight="500" fill="#7a2020" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">Write</text>

  <!-- Thin line separator -->
  <line x1="60" y1="726" x2="660" y2="726" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="360" y="746" text-anchor="middle" font-size="10" fill="#aaa" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">Every angle covered — the agent can't read, find, search, edit, or write secret files</text>
</svg>