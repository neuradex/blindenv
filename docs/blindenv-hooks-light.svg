<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .title { font-size: 16px; font-weight: 600; fill: #1a1a1a; }
    .subtitle { font-size: 12px; font-weight: 400; fill: #656565; }
    .layer-title { font-size: 13px; font-weight: 600; }
    .layer-desc { font-size: 11px; font-weight: 400; }
    .box-title { font-size: 12px; font-weight: 600; }
    .label { font-size: 10px; font-weight: 500; fill: #888; }
    .zone-label { font-size: 10px; font-weight: 600; fill: #999; letter-spacing: 0.5px; text-transform: uppercase; }
    .note { font-size: 11px; font-weight: 400; fill: #777; }
    .note-bold { font-size: 12px; font-weight: 600; fill: #444; }
  </style>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1.5L7.5 5L2 8.5" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="620" rx="12" fill="#ffffff"/>

  <!-- Title -->
  <text class="title" x="360" y="36" text-anchor="middle">Claude Code hook architecture</text>
  <text class="subtitle" x="360" y="54" text-anchor="middle">Six PreToolUse hooks guard every agent action</text>

  <!-- Agent box -->
  <rect x="260" y="74" width="200" height="46" rx="8" fill="#EBF3FE" stroke="#B0CFF5" stroke-width="0.75"/>
  <text class="box-title" x="360" y="102" text-anchor="middle" fill="#1a5a9e">Claude Code agent</text>

  <!-- Arrow down -->
  <line x1="360" y1="120" x2="360" y2="154" stroke="#3a7fd5" stroke-width="1.2" marker-end="url(#arr)"/>
  <text class="label" x="372" y="142" fill="#3a7fd5">PreToolUse</text>

  <!-- blindenv.yml zone -->
  <rect x="50" y="154" width="620" height="350" rx="10" fill="#f8f8f8" stroke="#ccc" stroke-width="0.75"/>
  <text class="zone-label" x="360" y="176" text-anchor="middle">blindenv.yml</text>

  <!-- Row 1: Bash hook (full width) -->
  <rect x="80" y="192" width="560" height="52" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.75"/>
  <text class="layer-title" x="100" y="212" fill="#3C3489">Bash hook</text>
  <text class="layer-desc" x="100" y="230" fill="#534ab7">Rewrites cmd → blindenv run '...' — secrets injected, output redacted</text>

  <!-- Row 2: Read hook + Edit/Write hook -->
  <rect x="80" y="256" width="270" height="52" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.75"/>
  <text class="layer-title" x="100" y="276" fill="#712b13">Read hook</text>
  <text class="layer-desc" x="100" y="294" fill="#993c1d">Secret files → "does not exist"</text>

  <rect x="370" y="256" width="270" height="52" rx="8" fill="#FCEBEB" stroke="#F09595" stroke-width="0.75"/>
  <text class="layer-title" x="390" y="276" fill="#791f1f">Edit / Write hook</text>
  <text class="layer-desc" x="390" y="294" fill="#a32d2d">Secret files → "does not exist"</text>

  <!-- Row 3: Grep hook + Glob hook -->
  <rect x="80" y="320" width="270" height="52" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.75"/>
  <text class="layer-title" x="100" y="340" fill="#633806">Grep hook</text>
  <text class="layer-desc" x="100" y="358" fill="#854f0b">Injects exclusion globs</text>

  <rect x="370" y="320" width="270" height="52" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.75"/>
  <text class="layer-title" x="390" y="340" fill="#633806">Glob hook</text>
  <text class="layer-desc" x="390" y="358" fill="#854f0b">Injects exclusion patterns</text>

  <!-- Row 4: Config guard (full width) -->
  <rect x="80" y="384" width="560" height="52" rx="8" fill="#f0f0ee" stroke="#d0d0cc" stroke-width="0.75"/>
  <text class="layer-title" x="100" y="404" fill="#444">Config guard</text>
  <text class="layer-desc" x="100" y="422" fill="#777">blindenv.yml edits → explicitly blocked (tamper-proof)</text>

  <!-- Result summary pills -->
  <rect x="100" y="456" width="220" height="32" rx="16" fill="#f4f4f2" stroke="#ddd" stroke-width="0.5"/>
  <text x="210" y="477" text-anchor="middle" font-size="11" font-weight="500" fill="#666" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">Secret files → invisible</text>

  <rect x="400" y="456" width="220" height="32" rx="16" fill="#f4f4f2" stroke="#ddd" stroke-width="0.5"/>
  <text x="510" y="477" text-anchor="middle" font-size="11" font-weight="500" fill="#666" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">Config → tamper-proof</text>

  <!-- Bottom note -->
  <text class="note" x="360" y="540" text-anchor="middle">The agent never sees a "blocked" message for secret files —</text>
  <text class="note-bold" x="360" y="560" text-anchor="middle">they simply don't exist.</text>
</svg>